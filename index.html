<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yatzy Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a202c; color: white; margin: 0; padding: 20px; touch-action: manipulation; }
        .container { max-width: 500px; margin: auto; background: #2d3748; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        /* Menu Buttons */
        .menu-box { display: flex; flex-direction: column; gap: 15px; }
        button { padding: 15px; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        
        .btn-offline { background: #48bb78; color: white; }
        .btn-online { background: #4299e1; color: white; }
        .btn-action { background: #f6e05e; color: #1a202c; margin-top: 10px; }

        .hidden { display: none !important; }
        
        /* Dice & UI */
        .dice-area { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .die { background: white; color: #1a202c; width: 55px; height: 55px; line-height: 55px; border-radius: 10px; font-size: 2rem; font-weight: bold; border: 4px solid transparent; }
        .die.held { border-color: #f6e05e; background: #cbd5e0; }
        
        input { padding: 12px; border-radius: 8px; border: none; width: 80%; margin-bottom: 10px; font-size: 1rem; }
        .status-text { color: #a0aec0; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎲 Yatzy Pro</h1>

        <div id="main-menu" class="menu-box">
            <button class="btn-offline" onclick="startOffline()">Single Player</button>
            <button class="btn-online" onclick="showOnlineMenu()">Play Online</button>
        </div>

        <div id="online-setup" class="menu-box hidden">
            <input type="text" id="playerName" placeholder="Your Name">
            <button class="btn-online" onclick="hostGame()">Host a Room</button>
            <button class="btn-online" style="background:#718096" onclick="showJoinField()">Join a Room</button>
            
            <div id="join-field" class="hidden">
                <input type="text" id="roomInput" placeholder="5-Digit Code">
                <button class="btn-offline" onclick="joinGame()">Connect</button>
            </div>
            
            <p id="roomStatus" class="status-text"></p>
            <button onclick="location.reload()" style="background:none; color:#a0aec0; font-size:0.8rem;">← Back</button>
        </div>

        <div id="game-area" class="hidden">
            <div class="dice-area">
                <div class="die" id="d0" onclick="toggleHold(0)">?</div>
                <div class="die" id="d1" onclick="toggleHold(1)">?</div>
                <div class="die" id="d2" onclick="toggleHold(2)">?</div>
                <div class="die" id="d3" onclick="toggleHold(3)">?</div>
                <div class="die" id="d4" onclick="toggleHold(4)">?</div>
            </div>
            <button id="roll-btn" class="btn-action" onclick="userRoll()">Roll Dice</button>
            <p id="roll-count" class="status-text">Rolls left: 3</p>
            <button onclick="location.reload()" style="background:#e53e3e; margin-top:30px;">Quit Game</button>
        </div>
    </div>
