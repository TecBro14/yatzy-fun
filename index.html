<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yatzy Professional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #ffffff;
        }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        canvas { background: var(--card); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-width: 95vw; max-height: 90vh; }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
window.onload = function() {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    canvas.width = 1100; canvas.height = 540;

    const STATE = { MENU: 0, PLAYER_COUNT: 1, PLAYING: 2 };
    let currentState = STATE.MENU;
    let showLeaderboard = false;
    
    let players = []; 
    let pIdx = 0;
    let dice = [1, 2, 3, 4, 5];
    let kept = [false, false, false, false, false];
    let rollsLeft = 2;
    let isRolling = false;
    let rollTimer = 0;

    const cats = ["1s", "2s", "3s", "4s", "5s", "6s", "3k", "4k", "FH", "SS", "LS", "YZ", "CH"];
    const colors = ["#6366f1", "#f43f5e", "#10b981", "#f59e0b"];

    // Load Global Data & Personal Bests
    let globalLeaderboard = JSON.parse(localStorage.getItem("yatzy_global_data")) || [];

    function getPersonalBest(name) {
        let entry = globalLeaderboard.find(u => u.name.toLowerCase() === name.toLowerCase());
        return entry ? entry.score : 0;
    }

    function saveToLeaderboard(name, score) {
        let entry = globalLeaderboard.find(u => u.name.toLowerCase() === name.toLowerCase());
        if (entry) {
            entry.score = Math.max(entry.score, score);
        } else {
            globalLeaderboard.push({ name: name, score: score });
        }
        globalLeaderboard.sort((a, b) => b.score - a.score);
        globalLeaderboard = globalLeaderboard.slice(0, 10);
        localStorage.setItem("yatzy_global_data", JSON.stringify(globalLeaderboard));
    }

    function calculateTotal(playerObj) {
        return cats.reduce((sum, c) => sum + (playerObj.scores[c] || 0), 0);
    }

    function getScore(cat, d) {
        let counts = {}; d.forEach(v => counts[v] = (counts[v] || 0) + 1);
        let sum = d.reduce((a, b) => a + b, 0);
        let vals = Object.values(counts);
        let s = [...new Set(d)].sort().join("");
        if (cat.endsWith("s")) return d.filter(x => x == parseInt(cat)).length * parseInt(cat);
        if (cat === "3k") return vals.some(v => v >= 3) ? sum : 0;
        if (cat === "4k") return vals.some(v => v >= 4) ? sum : 0;
        if (cat === "FH") return (vals.includes(2) && vals.includes(3)) || vals.includes(5) ? 25 : 0;
        if (cat === "SS") return /1234|2345|3456/.test(s) ? 30 : 0;
        if (cat === "LS") return (s === "12345" || s === "23456") ? 40 : 0;
        if (cat === "YZ") return vals.includes(5) ? 50 : 0;
        return sum;
    }

    function drawBtn(x, y, w, h, txt, color, active = true) {
        ctx.fillStyle = active ? color : "#e2e8f0";
        ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.fill();
        ctx.fillStyle = active ? "white" : "#94a3b8";
        ctx.textAlign = "center"; ctx.font = "bold 16px sans-serif";
        ctx.fillText(txt, x + w/2, y + h/2 + 6);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentState === STATE.MENU) {
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 80px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("YATZY", 550, 220);
            drawBtn(450, 300, 200, 60, "PLAY GAME", "#6366f1");
            drawBtn(450, 375, 200, 50, "LEADERBOARD", "#1e293b");
        }

        else if (currentState === STATE.PLAYER_COUNT) {
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("Select Players", 550, 180);
            for(let i=1; i<=4; i++) drawBtn(310 + (i-1)*125, 260, 100, 100, i.toString(), colors[i-1]);
        }

        else if (currentState === STATE.PLAYING) {
            // Header
            ctx.fillStyle = "#f8fafc"; ctx.fillRect(0, 0, 1100, 70);
            ctx.textAlign = "left"; ctx.font = "bold 20px sans-serif"; ctx.fillStyle = colors[pIdx];
            ctx.fillText(`TURN: ${players[pIdx].name.toUpperCase()}`, 40, 42);
            ctx.textAlign = "right"; ctx.fillStyle = "#64748b";
            ctx.fillText(`Extra Rolls: ${rollsLeft}`, 1060, 42);

            // Dice
            dice.forEach((v, i) => {
                let dx = 320 + i * 90, dy = 100;
                let shake = (isRolling && !kept[i]) ? (Math.random()-0.5)*10 : 0;
                ctx.fillStyle = kept[i] ? "#dcfce7" : "#fff";
                ctx.strokeStyle = kept[i] ? "#22c55e" : "#e2e8f0";
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.roundRect(dx + shake, dy + shake, 70, 70, 15); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#1e293b"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(v, dx + 35 + shake, dy + 45 + shake);
            });

            drawBtn(780, 105, 140, 60, "ROLL AGAIN", "#6366f1", (rollsLeft > 0 && !isRolling));

            // Scoring Table
            cats.forEach((c, i) => {
                let x = 30 + i * 82;
                ctx.fillStyle = "#64748b"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(c, x + 35, 235);
                players.forEach((p, pI) => {
                    let y = 250 + pI * 45;
                    let scored = p.scores[c] !== null;
                    ctx.fillStyle = scored ? colors[pI] : (pI === pIdx ? "#f1f5f9" : "#fff");
                    ctx.strokeStyle = (pI === pIdx && !scored) ? colors[pI] : "#e2e8f0";
                    ctx.beginPath(); ctx.roundRect(x, y, 70, 38, 8); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = scored ? "white" : (pI === pIdx ? "#94a3b8" : "#f1f5f9");
                    ctx.font = "bold 16px sans-serif";
                    ctx.fillText(scored ? p.scores[c] : getScore(c, dice), x + 35, y + 24);
                });
            });

            // --- BOTTOM SCORE BAR ---
            ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 480, 1100, 60);
            ctx.textAlign = "left"; ctx.font = "bold 18px sans-serif"; ctx.fillStyle = "#94a3b8";
            
            let currentTotal = calculateTotal(players[pIdx]);
            let bestEver = getPersonalBest(players[pIdx].name);
            // If current score beats best ever, show current score as the new "high"
            let highToShow = Math.max(currentTotal, bestEver);

            ctx.fillText(`CURRENT SCORE: `, 40, 517);
            ctx.fillStyle = "#fff"; ctx.fillText(currentTotal, 200, 517);
            
            ctx.textAlign = "right"; ctx.fillStyle = "#94a3b8";
            ctx.fillText(`HIGH SCORE: `, 1000, 517);
            ctx.fillStyle = "#fbbf24"; ctx.fillText(highToShow, 1060, 517);
        }

        if (showLeaderboard) {
            ctx.fillStyle = "rgba(15, 23, 42, 0.9)"; ctx.fillRect(0,0,1100,540);
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.roundRect(375, 50, 350, 440, 24); ctx.fill();
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("Global Top Scores", 550, 100);
            globalLeaderboard.forEach((e, i) => {
                ctx.textAlign = "left"; ctx.fillStyle = "#475569"; ctx.font = "18px sans-serif";
                ctx.fillText(`${i+1}. ${e.name}`, 410, 150 + i*32);
                ctx.textAlign = "right"; ctx.fillText(e.score, 690, 150 + i*32);
            });
            drawBtn(475, 420, 150, 45, "CLOSE", "#f43f5e");
        }

        requestAnimationFrame(() => {
            if (isRolling) {
                rollTimer--;
                dice.forEach((v, i) => { if (!kept[i]) dice[i] = Math.floor(Math.random() * 6) + 1; });
                if (rollTimer <= 0) isRolling = false;
            }
            render();
        });
    }

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);

        if (showLeaderboard) {
            if (mx > 475 && mx < 625 && my > 420 && my < 465) showLeaderboard = false;
            return;
        }

        if (currentState === STATE.MENU) {
            if (mx > 450 && mx < 650 && my > 300 && my < 360) currentState = STATE.PLAYER_COUNT;
            if (mx > 450 && mx < 650 && my > 375 && my < 425) showLeaderboard = true;
        }
        else if (currentState === STATE.PLAYER_COUNT) {
            for(let i=1; i<=4; i++) {
                let bx = 310 + (i-1)*125;
                if (mx > bx && mx < bx + 100 && my > 260 && my < 360) {
                    players = [];
                    for(let j=0; j<i; j++) {
                        let n = prompt(`Enter Name for Player ${j+1}:`) || `Player ${j+1}`;
                        players.push({ name: n, scores: Object.fromEntries(cats.map(c => [c, null])) });
                    }
                    pIdx = 0; rollsLeft = 2; currentState = STATE.PLAYING; dice = [1,1,1,1,1]; roll();
                }
            }
        }
        else if (currentState === STATE.PLAYING) {
            dice.forEach((v, i) => {
                let dx = 320 + i * 90;
                if (mx > dx && mx < dx + 70 && my > 100 && my < 170) kept[i] = !kept[i];
            });
            if (mx > 780 && mx < 920 && my > 105 && my < 165 && rollsLeft > 0 && !isRolling) {
                rollsLeft--; roll();
            }
            cats.forEach((c, i) => {
                let x = 30 + i * 82, y = 250 + pIdx * 45;
                if (mx > x && mx < x + 70 && my > y && my < y + 38 && players[pIdx].scores[c] === null) {
                    players[pIdx].scores[c] = getScore(c, dice);
                    let allFinished = players.every(p => cats.every(cat => p.scores[cat] !== null));
                    if (allFinished) {
                        players.forEach(p => saveToLeaderboard(p.name, calculateTotal(p)));
                        alert("Game Over!"); currentState = STATE.MENU;
                    } else {
                        pIdx = (pIdx + 1) % players.length;
                        rollsLeft = 2; kept = [false, false, false, false, false]; roll();
                    }
                }
            });
        }
    };
    render();
};
</script>
</body>
</html>
