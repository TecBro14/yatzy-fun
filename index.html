<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yatzy Pro: Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #ffffff; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { background: var(--card); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-width: 95vw; max-height: 90vh; }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
window.onload = function() {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    canvas.width = 1100; canvas.height = 540;

    const STATE = { MENU: 0, PLAYER_COUNT: 1, PLAYING: 2, ONLINE_LOBBY: 3, TUTORIAL: 4 };
    let currentState = STATE.MENU;
    let showLeaderboard = false;
    let roomCode = "";
    
    let players = []; 
    let pIdx = 0;
    let dice = [1, 2, 3, 4, 5];
    let kept = [false, false, false, false, false];
    let rollsLeft = 2;
    let isRolling = false;
    let rollTimer = 0;

    const cats = ["1s", "2s", "3s", "4s", "5s", "6s", "3k", "4k", "FH", "SS", "LS", "YZ", "CH"];
    const colors = ["#6366f1", "#f43f5e", "#10b981", "#f59e0b"];
    let globalLeaderboard = JSON.parse(localStorage.getItem("yatzy_global_data")) || [];

    // --- Online & Utility Logic ---
    function generateRoomCode() {
        return Math.floor(10000 + Math.random() * 90000).toString();
    }

    function calculateTotal(p) { return cats.reduce((s, c) => s + (p.scores[c] || 0), 0); }

    function getWinner() {
        let sorted = [...players].sort((a, b) => calculateTotal(b) - calculateTotal(a));
        return sorted[0];
    }

    function drawBtn(x, y, w, h, txt, color, active = true) {
        ctx.fillStyle = active ? color : "#e2e8f0";
        ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.fill();
        ctx.fillStyle = active ? "white" : "#94a3b8";
        ctx.textAlign = "center"; ctx.font = "bold 16px sans-serif";
        ctx.fillText(txt, x + w/2, y + h/2 + 6);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentState === STATE.MENU) {
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 80px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("YATZY", 550, 180);
            drawBtn(450, 240, 200, 50, "LOCAL PLAY", "#6366f1");
            drawBtn(450, 305, 200, 50, "ONLINE ROOMS", "#10b981");
            drawBtn(450, 370, 200, 50, "TUTORIAL", "#f59e0b");
            drawBtn(450, 435, 200, 50, "LEADERBOARD", "#1e293b");
        }

        else if (currentState === STATE.ONLINE_LOBBY) {
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("Online Multiplayer", 550, 150);
            drawBtn(350, 250, 180, 80, "CREATE ROOM", "#6366f1");
            drawBtn(570, 250, 180, 80, "JOIN ROOM", "#1e293b");
            if(roomCode) {
                ctx.fillStyle = "#6366f1"; ctx.fillText(`ROOM CODE: ${roomCode}`, 550, 400);
                ctx.font = "16px sans-serif"; ctx.fillText("Share this code with a friend", 550, 430);
                drawBtn(475, 460, 150, 40, "START", "#10b981");
            }
        }

        else if (currentState === STATE.TUTORIAL) {
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 32px sans-serif"; ctx.fillText("How to Play", 550, 100);
            ctx.font = "18px sans-serif"; ctx.textAlign = "left";
            const lines = [
                "1. Each turn starts with an automatic roll.",
                "2. Click dice you want to keep (they turn green).",
                "3. You have 2 extra rolls to improve your hand.",
                "4. Click a box in your row to record your score.",
                "5. Try to get a YATZY (5 of a kind) for 50 points!",
                "6. The player with the highest total wins."
            ];
            lines.forEach((l, i) => ctx.fillText(l, 350, 160 + i * 40));
            drawBtn(450, 450, 200, 50, "BACK TO MENU", "#6366f1");
        }

        else if (currentState === STATE.PLAYING) {
            // Header & Dice (Logic from previous step)
            ctx.fillStyle = "#f8fafc"; ctx.fillRect(0, 0, 1100, 70);
            ctx.textAlign = "left"; ctx.font = "bold 20px sans-serif"; ctx.fillStyle = colors[pIdx];
            ctx.fillText(`TURN: ${players[pIdx].name.toUpperCase()}`, 40, 42);

            dice.forEach((v, i) => {
                let dx = 320 + i * 90, dy = 100;
                ctx.fillStyle = kept[i] ? "#dcfce7" : "#fff";
                ctx.strokeStyle = kept[i] ? "#22c55e" : "#e2e8f0";
                ctx.lineWidth = 3; ctx.beginPath(); ctx.roundRect(dx, dy, 70, 70, 15); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#1e293b"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(v, dx + 35, dy + 45);
            });

            drawBtn(780, 105, 140, 60, "ROLL AGAIN", "#6366f1", rollsLeft > 0);

            // Score Table
            cats.forEach((c, i) => {
                let x = 30 + i * 82;
                players.forEach((p, pI) => {
                    let y = 250 + pI * 45;
                    let scored = p.scores[c] !== null;
                    ctx.fillStyle = scored ? colors[pI] : (pI === pIdx ? "#f1f5f9" : "#fff");
                    ctx.beginPath(); ctx.roundRect(x, y, 70, 38, 8); ctx.fill();
                    ctx.fillStyle = scored ? "white" : "#94a3b8";
                    ctx.fillText(scored ? p.scores[cat] : "-", x + 35, y + 24);
                });
            });

            // Bottom Bar
            ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 480, 1100, 60);
            ctx.textAlign = "left"; ctx.font = "bold 18px sans-serif"; ctx.fillStyle = "#fff";
            ctx.fillText(`PLAYER: ${players[pIdx].name} | SCORE: ${calculateTotal(players[pIdx])}`, 40, 517);
        }

        requestAnimationFrame(render);
    }

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);

        if (currentState === STATE.MENU) {
            if (mx > 450 && mx < 650) {
                if (my > 240 && my < 290) currentState = STATE.PLAYER_COUNT;
                if (my > 305 && my < 355) currentState = STATE.ONLINE_LOBBY;
                if (my > 370 && my < 420) currentState = STATE.TUTORIAL;
                if (my > 435 && my < 485) showLeaderboard = true;
            }
        }
        else if (currentState === STATE.ONLINE_LOBBY) {
            if (mx > 350 && mx < 530 && my > 250 && my < 330) roomCode = generateRoomCode();
            if (mx > 570 && mx < 750 && my > 250 && my < 330) {
                let input = prompt("Enter 5-digit Room Code:");
                if (input && input.length === 5) { alert("Joined Room " + input); roomCode = input; }
            }
            if (roomCode && mx > 475 && mx < 625 && my > 460 && my < 500) {
                // Start Online Match Logic...
            }
        }
        else if (currentState === STATE.TUTORIAL && mx > 450 && mx < 650 && my > 450 && my < 500) currentState = STATE.MENU;
        // ... (Include other click handlers for scoring and dice)
    };

    render();
};
</script>
</body>
</html>
