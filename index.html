```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Yatzy</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
background:rgba(255,255,255,.2);
backdrop-filter:blur(14px);
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

</style>
</head>

<body>

<canvas id="game" width="900" height="520"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const MENU=0
const PLAYER_SELECT=1
const PLAYING=2

let state=MENU

let dice=[1,2,3,4,5]
let kept=[false,false,false,false,false]

let rolls=2
let rolling=false
let rollTimer=0

function roll(){
return Math.floor(Math.random()*6)+1
}

function drawButton(x,y,w,h,text){

ctx.fillStyle="rgba(255,255,255,.3)"
ctx.fillRect(x,y,w,h)

ctx.strokeStyle="white"
ctx.strokeRect(x,y,w,h)

ctx.fillStyle="white"
ctx.font="20px Arial"
ctx.fillText(text,x+w/2-ctx.measureText(text).width/2,y+28)

}

function drawDice(x,y,val,keep){

ctx.save()

if(keep){
ctx.shadowColor="#00ff88"
ctx.shadowBlur=20
}

ctx.fillStyle="white"
ctx.fillRect(x,y,60,60)
ctx.strokeRect(x,y,60,60)

ctx.fillStyle="black"
ctx.font="22px Arial"
ctx.fillText(val,x+25,y+38)

ctx.restore()

}

canvas.onclick=e=>{

let rect=canvas.getBoundingClientRect()
let mx=e.clientX-rect.left
let my=e.clientY-rect.top

if(state==MENU){

if(mx>350&&mx<550&&my>240&&my<290){
state=PLAYER_SELECT
}

}

else if(state==PLAYER_SELECT){

for(let i=1;i<=4;i++){

let y=160+i*60

if(mx>350&&mx<550&&my>y&&my<y+40){
state=PLAYING
}

}

}

else if(state==PLAYING){

for(let i=0;i<5;i++){

let x=140+i*120

if(mx>x&&mx<x+60&&my>120&&my<180){
kept[i]=!kept[i]
}

}

if(mx>740&&mx<840&&my>120&&my<180&&rolls>0&&!rolling){

rolling=true
rollTimer=20
rolls--

}

}

}

function update(){

if(rolling){

rollTimer--

for(let i=0;i<5;i++){
if(!kept[i]) dice[i]=roll()
}

if(rollTimer<=0){
rolling=false
}

}

}

function draw(){

ctx.clearRect(0,0,900,520)

if(state==MENU){

ctx.fillStyle="white"
ctx.font="48px Arial"
ctx.fillText("YATZY",360,150)

drawButton(350,240,200,50,"PLAY")

}

else if(state==PLAYER_SELECT){

ctx.fillStyle="white"
ctx.font="32px Arial"
ctx.fillText("Select Players",330,120)

for(let i=1;i<=4;i++){
drawButton(350,160+i*60,200,40,i+" Player"+(i>1?"s":""))
}

}

else if(state==PLAYING){

ctx.fillStyle="white"
ctx.font="20px Arial"
ctx.fillText("Rolls Left: "+rolls,50,60)

for(let i=0;i<5;i++){

let x=140+i*120
let shakeX=rolling&&!kept[i]?Math.random()*6-3:0
let shakeY=rolling&&!kept[i]?Math.random()*6-3:0

drawDice(x+shakeX,120+shakeY,dice[i],kept[i])

}

drawButton(740,120,100,60,"ROLL")

}

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
