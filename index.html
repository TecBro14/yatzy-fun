<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yatzy Game</title>
    <style>
        body { margin: 0; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { background: #fff; border: 4px solid #555; max-width: 95vw; max-height: 90vh; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="game"></canvas>

<script>
    window.onload = function() {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // Force dimensions
        canvas.width = 1100;
        canvas.height = 540;

        // Simple State
        let state = "MENU";
        let leaderboard = [];
        
        // Try to load data safely
        try {
            const saved = localStorage.getItem("yatzy_leaderboard");
            if (saved) leaderboard = JSON.parse(saved);
        } catch(e) { console.error("Storage error"); }

        function draw() {
            // Clear Background
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state === "MENU") {
                ctx.fillStyle = "black";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("YATZY", 550, 200);

                // Play Button
                ctx.fillStyle = "#3498db";
                ctx.fillRect(450, 300, 200, 60);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.fillText("START", 550, 340);
            }

            requestAnimationFrame(draw);
        }

        canvas.onclick = function() {
            if (state === "MENU") {
                alert("Game starting! (Logic will load next)");
                // You can set state to PLAYING here once confirmed working
            }
        };

        // Start the loop
        draw();
        console.log("Game loop started");
    };
</script>
</body>
</html>
