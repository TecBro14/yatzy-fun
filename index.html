<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yatzy Multiplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a202c; color: white; padding: 40px; }
        .card { background: #2d3748; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 15px rgba(0,0,0,0.3); min-width: 300px; }
        .hidden { display: none; }
        input { padding: 12px; border-radius: 5px; border: none; width: 80%; margin-bottom: 10px; }
        button { padding: 12px 24px; border-radius: 5px; border: none; background: #4299e1; color: white; font-weight: bold; cursor: pointer; margin: 5px; }
        button:hover { background: #3182ce; }
        #dice-display { font-size: 3rem; margin: 20px; color: #f6e05e; }
    </style>
</head>
<body>

    <div id="lobby" class="card">
        <h1>🎲 Yatzy Online</h1>
        <input type="text" id="playerName" placeholder="Enter Your Name">
        <br>
        <div id="menu-buttons">
            <button onclick="setupHost()">Host Game</button>
            <button onclick="showJoinInput()">Join Game</button>
        </div>

        <div id="host-zone" class="hidden">
            <p>Room Code: <span id="roomCodeDisplay" style="font-size: 1.5rem; color: #63b3ed;"></span></p>
            <p>Waiting for an opponent...</p>
        </div>

        <div id="join-zone" class="hidden">
            <input type="text" id="joinCodeInput" placeholder="Enter 5-Digit Code">
            <br>
            <button onclick="joinGame()">Connect Now</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="game-status">Match Started!</h2>
        <div id="dice-display">🎲</div>
        <button id="rollBtn" onclick="rollDice()">Roll Dice</button>
        <p id="opponent-info"></p>
    </div>

    <script>
        // 1. YOUR DATABASE CONNECTION
        const SUPABASE_URL = 'https://zdanffxnlufgnkmrsoxu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwJMOJZo3kIwNc_MryrsWQ_puYbU3RG';
        const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myName = "";
        let currentRoom = null;
        let isHost = false;

        // 2. LOBBY LOGIC
        function setupHost() {
            myName = document.getElementById('playerName').value;
            if (!myName) return alert("Enter a name!");
            
            isHost = true;
            currentRoom = Math.floor(10000 + Math.random() * 90000).toString();
            document.getElementById('roomCodeDisplay').innerText = currentRoom;
            
            document.getElementById('menu-buttons').classList.add('hidden');
            document.getElementById('host-zone').classList.remove('hidden');
            
            createRoomInDatabase();
        }

        function showJoinInput() {
            myName = document.getElementById('playerName').value;
            if (!myName) return alert("Enter a name!");
            document.getElementById('menu-buttons').classList.add('hidden');
            document.getElementById('join-zone').classList.remove('hidden');
        }

        // 3. DATABASE ACTIONS
        async function createRoomInDatabase() {
            const { error } = await supabase
                .from('rooms')
                .insert([{ room_code: currentRoom, player_1: myName, status: 'waiting' }]);
            
            if (error) console.error(error);
            listenForPlayers();
        }

        async function joinGame() {
            const code = document.getElementById('joinCodeInput').value;
            const { error } = await supabase
                .from('rooms')
                .update({ player_2: myName, status: 'playing' })
                .eq('room_code', code);

            if (error) {
                alert("Room not found!");
            } else {
                currentRoom = code;
                switchToGame();
                listenForDice();
            }
        }

        // 4. REALTIME LISTENERS
        function listenForPlayers() {
            supabase.channel('lobby')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `room_code=eq.${currentRoom}` }, 
                payload => {
                    if (payload.new.player_2) {
                        switchToGame();
                        listenForDice();
                    }
                }).subscribe();
        }

        function listenForDice() {
            // This listens for when the OTHER player rolls
            supabase.channel('game')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `room_code=eq.${currentRoom}` }, 
                payload => {
                    if (payload.new.last_roll) {
                        document.getElementById('dice-display').innerText = "🎲 " + payload.new.last_roll;
                    }
                }).subscribe();
        }

        // 5. GAMEPLAY
        async function rollDice() {
            const val = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-display').innerText = "🎲 " + val;
            
            // Send roll to database so opponent sees it
            await supabase.from('rooms').update({ last_roll: val }).eq('room_code', currentRoom);
        }

        function switchToGame() {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
