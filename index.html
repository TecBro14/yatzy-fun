```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Yatzy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

</style>
</head>

<body>

<canvas id="game" width="1000" height="520"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const MENU=0
const PLAYING=1
const GAME_OVER=2

let gameState=MENU

let numPlayers=4
let pIdx=0

let dice=[1,2,3,4,5]
let kept=[false,false,false,false,false]

let rollsLeft=2
let rolling=false
let rollTimer=0

const colors=["blue","red","green","purple"]

const cats=["1s","2s","3s","4s","5s","6s","3k","4k","FH","SS","LS","YZ","CH"]

let scores=[]

function rollDie(){
return Math.floor(Math.random()*6)+1
}

function startTurn(){

for(let i=0;i<5;i++) dice[i]=rollDie()

while(new Set(dice).size==1){
for(let i=0;i<5;i++) dice[i]=rollDie()
}

kept=[false,false,false,false,false]
rollsLeft=2

}

function getVal(c,d){

let counts={}
d.forEach(v=>counts[v]=(counts[v]||0)+1)

let sum=d.reduce((a,b)=>a+b)

if(c.endsWith("s")){
let n=parseInt(c)
return d.filter(x=>x==n).length*n
}

if(c=="3k") return Object.values(counts).some(v=>v>=3)?sum:0
if(c=="4k") return Object.values(counts).some(v=>v>=4)?sum:0

if(c=="FH"){
let v=Object.values(counts).sort()
if(v.toString()=="2,3"||v.includes(5)) return 25
return 0
}

if(c=="SS"){
let s=[[1,2,3,4],[2,3,4,5],[3,4,5,6]]
return s.some(a=>a.every(x=>d.includes(x)))?30:0
}

if(c=="LS"){
let s=[...new Set(d)]
return s.length==5 && Math.max(...d)-Math.min(...d)==4?40:0
}

if(c=="YZ") return new Set(d).size==1?50:0

return sum

}

canvas.onclick=e=>{

let rect=canvas.getBoundingClientRect()
let mx=e.clientX-rect.left
let my=e.clientY-rect.top

if(gameState==MENU){

for(let i=1;i<=4;i++){

if(mx>440&&mx<560&&my>100+i*60&&my<140+i*60){

numPlayers=i

scores=[]
for(let p=0;p<numPlayers;p++){
let obj={}
cats.forEach(c=>obj[c]=null)
scores.push(obj)
}

startTurn()
gameState=PLAYING

}

}

}

else if(gameState==PLAYING){

for(let i=0;i<5;i++){

let x=40+i*60

if(mx>x&&mx<x+45&&my>60&&my<105){
kept[i]=!kept[i]
}

}

if(mx>350&&mx<430&&my>60&&my<105 && rollsLeft>0 && !rolling){

rolling=true
rollTimer=18
rollsLeft--

}

for(let i=0;i<cats.length;i++){

let x=10+i*60

if(mx>x&&mx<x+55&&my>280&&my<420){

let c=cats[i]

if(scores[pIdx][c]==null){

scores[pIdx][c]=getVal(c,dice)

pIdx=(pIdx+1)%numPlayers
startTurn()

}

}

}

}

}

function update(){

if(rolling){

rollTimer--

for(let i=0;i<5;i++){
if(!kept[i]) dice[i]=rollDie()
}

if(rollTimer<=0) rolling=false

}

}

function roundRect(x,y,w,h,r){

ctx.beginPath()
ctx.moveTo(x+r,y)
ctx.lineTo(x+w-r,y)
ctx.quadraticCurveTo(x+w,y,x+w,y+r)
ctx.lineTo(x+w,y+h-r)
ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
ctx.lineTo(x+r,y+h)
ctx.quadraticCurveTo(x,y+h,x,y+h-r)
ctx.lineTo(x,y+r)
ctx.quadraticCurveTo(x,y,x+r,y)
ctx.fill()
ctx.stroke()

}

function draw(){

ctx.clearRect(0,0,1000,520)

if(gameState==MENU){

ctx.font="40px Arial"
ctx.fillText("YATZY",440,60)

for(let i=1;i<=4;i++){

ctx.fillStyle="#ddd"
roundRect(440,100+i*60,120,40,10)

ctx.fillStyle="black"
ctx.fillText(i+" Player"+(i>1?"s":""),455,128+i*60)

}

}

else if(gameState==PLAYING){

ctx.fillStyle=colors[pIdx]
ctx.font="18px Arial"
ctx.fillText("P"+(pIdx+1)+" TURN | ROLLS: "+rollsLeft,40,30)

for(let i=0;i<5;i++){

let x=40+i*60

let shakeX=rolling&&!kept[i]?Math.random()*4-2:0
let shakeY=rolling&&!kept[i]?Math.random()*4-2:0

ctx.fillStyle=kept[i]?"#c8f7c5":"#fff"

roundRect(x+shakeX,60+shakeY,45,45,8)

ctx.fillStyle="black"
ctx.fillText(dice[i],x+16+shakeX,88+shakeY)

}

ctx.fillStyle="#ddd"
roundRect(350,60,80,45,10)

ctx.fillStyle="black"
ctx.fillText("ROLL",370,88)

for(let i=0;i<cats.length;i++){

let x=10+i*60

ctx.fillStyle=i%2?"#f4f4f4":"#e9e9e9"
ctx.fillRect(x,280,55,140)

ctx.strokeRect(x,280,55,140)

ctx.fillStyle="black"
ctx.fillText(cats[i],x+18,295)

for(let p=0;p<numPlayers;p++){

let val=scores[p][cats[i]]

let disp="-"

if(val!=null) disp=val
else if(p==pIdx) disp=getVal(cats[i],dice)

ctx.fillText(disp,x+20,320+p*25)

}

}

for(let p=0;p<numPlayers;p++){

let total=0

for(let c of cats){
if(scores[p][c]!=null) total+=scores[p][c]
}

ctx.fillStyle=colors[p]
ctx.fillText("P"+(p+1)+": "+total,20+p*120,470)

}

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
