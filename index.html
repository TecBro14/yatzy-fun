<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yatzy-Fun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
width:95vw;
max-width:1000px;
height:auto;
display:block;
}

</style>

</head>

<body>

<canvas id="game" width="1000" height="520"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
ctx.imageSmoothingEnabled=true

const MENU=0
const PLAYER_SELECT=1
const PLAYING=2

let state=MENU

let numPlayers=4
let pIdx=0

let dice=[1,2,3,4,5]
let kept=[false,false,false,false,false]

let rollsLeft=2
let rolling=false
let rollTimer=0

const colors=["#3498db","#e74c3c","#2ecc71","#9b59b6"]

const cats=["1s","2s","3s","4s","5s","6s","3k","4k","FH","SS","LS","YZ","CH"]

let scores=[]

let lastTouchTime=0

function resetGame(){
state=MENU
pIdx=0
dice=[1,2,3,4,5]
kept=[false,false,false,false,false]
rollsLeft=2
scores=[]
}

function rollDie(){
return Math.floor(Math.random()*6)+1
}

function startTurn(){

for(let i=0;i<5;i++) dice[i]=rollDie()

while(new Set(dice).size==1){
for(let i=0;i<5;i++) dice[i]=rollDie()
}

kept=[false,false,false,false,false]
rollsLeft=2

}

function getVal(c,d){

let counts={}
d.forEach(v=>counts[v]=(counts[v]||0)+1)

let sum=d.reduce((a,b)=>a+b)

if(c.endsWith("s")){
let n=parseInt(c)
return d.filter(x=>x==n).length*n
}

if(c=="3k") return Object.values(counts).some(v=>v>=3)?sum:0
if(c=="4k") return Object.values(counts).some(v=>v>=4)?sum:0

if(c=="FH"){
let v=Object.values(counts).sort()
if(v.toString()=="2,3"||v.includes(5)) return 25
return 0
}

if(c=="SS"){
let s=[[1,2,3,4],[2,3,4,5],[3,4,5,6]]
return s.some(a=>a.every(x=>d.includes(x)))?30:0
}

if(c=="LS"){
let s=[...new Set(d)]
return s.length==5 && Math.max(...d)-Math.min(...d)==4?40:0
}

if(c=="YZ") return new Set(d).size==1?50:0

return sum

}

function roundRect(x,y,w,h,r){

ctx.beginPath()
ctx.moveTo(x+r,y)
ctx.lineTo(x+w-r,y)
ctx.quadraticCurveTo(x+w,y,x+w,y+r)
ctx.lineTo(x+w,y+h-r)
ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
ctx.lineTo(x+r,y+h)
ctx.quadraticCurveTo(x,y+h,x,y+h-r)
ctx.lineTo(x,y+r)
ctx.quadraticCurveTo(x,y,x+r,y)
ctx.closePath()
ctx.fill()
ctx.stroke()

}

canvas.addEventListener("touchstart",e=>{
lastTouchTime=Date.now()
handleClick(e.touches[0])
})

canvas.addEventListener("click",e=>{
if(Date.now()-lastTouchTime<500) return
handleClick(e)
})

function handleClick(e){

let rect=canvas.getBoundingClientRect()
let scaleX=canvas.width/rect.width
let scaleY=canvas.height/rect.height

let mx=(e.clientX-rect.left)*scaleX
let my=(e.clientY-rect.top)*scaleY

if(state==MENU){

if(mx>440 && mx<560 && my>220 && my<260){
state=PLAYER_SELECT
}

}

else if(state==PLAYER_SELECT){

for(let i=1;i<=4;i++){

let y=120+i*60

if(mx>440 && mx<560 && my>y && my<y+40){

numPlayers=i

scores=[]
for(let p=0;p<numPlayers;p++){
let obj={}
cats.forEach(c=>obj[c]=null)
scores.push(obj)
}

startTurn()
state=PLAYING

}

}

}

else if(state==PLAYING){

for(let i=0;i<5;i++){

let x=40+i*60

if(mx>x && mx<x+45 && my>60 && my<105){
kept[i]=!kept[i]
}

}

if(mx>350 && mx<430 && my>60 && my<105 && rollsLeft>0 && !rolling){

rolling=true
rollTimer=18
rollsLeft--

}

if(mx>880 && mx<980 && my>20 && my<50){
resetGame()
}

for(let i=0;i<cats.length;i++){

let x=10+i*60

if(mx>x && mx<x+55 && my>280 && my<420){

let c=cats[i]

if(scores[pIdx][c]==null){

scores[pIdx][c]=getVal(c,dice)

pIdx=(pIdx+1)%numPlayers
startTurn()

}

}

}

}

}

function update(){

if(rolling){

rollTimer--

for(let i=0;i<5;i++){
if(!kept[i]) dice[i]=rollDie()
}

if(rollTimer<=0) rolling=false

}

}

function drawCentered(text,x,y,w){

let width=ctx.measureText(text).width
ctx.fillText(text,x+w/2-width/2,y)

}

function draw(){

ctx.clearRect(0,0,1000,520)

if(state==MENU){

ctx.font="42px Arial"
ctx.fillStyle="black"
ctx.fillText("Yatzy-Fun",420,100)

ctx.fillStyle="#ddd"
roundRect(440,220,120,40,10)

ctx.fillStyle="black"
ctx.font="18px Arial"
drawCentered("PLAY",440,246,120)

}

else if(state==PLAYER_SELECT){

ctx.font="28px Arial"
ctx.fillStyle="black"
ctx.fillText("Select Players",400,80)

ctx.font="16px Arial"

for(let i=1;i<=4;i++){

let y=120+i*60

ctx.fillStyle="#ddd"
roundRect(440,y,120,40,10)

ctx.fillStyle="black"
drawCentered(i+" Player"+(i>1?"s":""),440,y+25,120)

}

}

else if(state==PLAYING){

ctx.fillStyle=colors[pIdx]
ctx.font="18px Arial"
ctx.fillText("P"+(pIdx+1)+" TURN | ROLLS: "+rollsLeft,40,30)

ctx.fillStyle="#ddd"
roundRect(880,20,100,30,8)
ctx.fillStyle="black"
ctx.font="14px Arial"
drawCentered("Restart",880,40,100)

for(let i=0;i<5;i++){

let x=40+i*60

let shakeX=rolling&&!kept[i]?Math.random()*4-2:0
let shakeY=rolling&&!kept[i]?Math.random()*4-2:0

ctx.fillStyle=kept[i]?"#c8f7c5":"#fff"
roundRect(x+shakeX,60+shakeY,45,45,8)

ctx.fillStyle="black"
ctx.fillText(dice[i],x+16+shakeX,88+shakeY)

}

ctx.fillStyle="#ddd"
roundRect(350,60,80,45,10)

ctx.fillStyle="black"
ctx.font="16px Arial"
drawCentered("ROLL",350,88,80)

for(let i=0;i<cats.length;i++){

let x=10+i*60

for(let p=0;p<numPlayers;p++){

let val=scores[p][cats[i]]
let y=300+p*25

if(val!=null){
ctx.fillStyle=colors[p]
}else if(p==pIdx){
ctx.fillStyle="#d0d0d0"
}else{
ctx.fillStyle="#ffffff"
}

ctx.fillRect(x,y,55,24)
ctx.strokeRect(x,y,55,24)

ctx.fillStyle="black"

let disp="-"

if(val!=null) disp=val
else if(p==pIdx) disp=getVal(cats[i],dice)

ctx.fillText(disp,x+18,y+17)

}

ctx.fillStyle="black"
ctx.font="14px Arial"
ctx.fillText(cats[i],x+18,295)

}

for(let p=0;p<numPlayers;p++){

let total=0

for(let c of cats){
if(scores[p][c]!=null) total+=scores[p][c]
}

ctx.fillStyle=colors[p]
ctx.fillText("P"+(p+1)+": "+total,20+p*120,470)

}

}

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
